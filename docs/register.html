<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportDeck - Smart Tournament Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar">
        <div class="container nav-content text-between">
            <a href="index.html" class="logo">SportDeck</a>
            <ul class="nav-links">
                <li><a href="https://github.com/iamziyan/SportDeck" target="_blank" class="btn btn-outline btn-sm"
                        style="display:flex; align-items:center; gap:0.4rem; padding:0.4rem 0.8rem; font-weight:600;"><svg
                            height="16" width="16" viewBox="0 0 16 16" fill="currentColor">
                            <path
                                d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-1.12.53-.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z">
                            </path>
                        </svg> GitHub</a></li>
                <li><a href="index.html">Tournaments</a></li>
                <li><a href="fixtures.html">Fixtures</a></li>
                <li><a href="results.html">Results</a></li>
                <li><a href="login.html" class="btn btn-outline">Login</a></li>
                <li><a href="register.html" class="btn btn-primary">Register</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">

        <div class="card auth-box" style="max-width: 500px;">
            <h2 class="text-center mb-2">Create an Account</h2>
            <p class="text-center text-muted mb-3">Join as a player to view tournaments</p>

            <form method="GET" action="login.html">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" required placeholder="Name">
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" required placeholder="you@gmail.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required minlength="6"
                        placeholder="••••••••">
                </div>
                <div class="flex gap-2">
                    <div class="form-group" style="flex:1">
                        <label class="form-label">Age</label>
                        <input type="number" name="age" class="form-control" required placeholder=" ">
                    </div>
                    <div class="form-group" style="flex:1">
                        <label class="form-label">Contact Number</label>
                        <input type="text" name="contact" class="form-control" placeholder="Optional">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-full mb-2">Register</button>
                <p class="text-center text-muted">Already have an account? <a href="login.html">Sign in</a></p>
            </form>
        </div>

    </main>

    <footer class="footer">
        <div class="container text-center">
            <p>&copy; 2026 SportDeck. Smart Tournament Management.</p>
        </div>
    </footer>

</body>

</html>
